services:
  - type: web
    name: hallucinot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.9
      - key: COURTLISTENER_API_TOKEN
        sync: false
